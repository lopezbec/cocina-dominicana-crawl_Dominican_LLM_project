output_dir: data/raw
plaintext_output_dir: data/processed
crawler:
  max_depth: 2
  delay_seconds: 0.5
  skip_existing: true
  max_retries: 3
  base_retry_delay: 2
  domain_validation_timeout: 5
filters:
  exclude_patterns:
  - wp-content
  - wp-json
  - xmlrpc
  - feed
  - comments
  - \.(jpg|jpeg|png|gif|svg|webp|ico)$
  - facebook\.com
  - instagram\.com
  - youtube\.com
  - pinterest\.com
  - twitter\.com
  - '#'
processing:
  filter_english: true
  min_content_length: 100
  navigation_patterns:
  - ¡Hola, gracias por visitarnos!.*
  - Comparte tus preguntas.*
  - Suscríbete.*para recibir.*
  - ¡No pierdas el contacto!.*
  - Síguenos en:.*
  footer_markers:
  - ¡Hola, gracias por visitarnos
  - Suscríbete para recibir